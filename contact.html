<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | GoRide Nepal</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="responsive.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <header class="header">

        <div class="logo">
            <i class="fa-solid fa-car-side"></i>
            <span>GoRide Nepal</span>
        </div>
         <div class="menu-toggle" id="menuToggle">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav>
            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>
                <li><a href="vehicles.html">Vehicles</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>

            </ul>
        </nav>

        <div class="nav-right">

            <button id="darkModeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>

        </div>

    </header>

    <section class="contact-section">

        <h1>Contact Us</h1>

        <div class="contact-container">

            <div class="contact-info">

                <h2>Get in Touch</h2>

                <p><i class="fa-solid fa-location-dot"></i> Kathmandu, Nepal</p>

                <p><i class="fa-solid fa-phone"></i> +977 98XXXXXXXX</p>

                <p><i class="fa-solid fa-envelope"></i> info@goridenepal.com</p>

                <div class="social">

                    <i class="fab fa-facebook"></i>
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-youtube"></i>

                </div>

            </div>

            <div class="contact-form">

                <form>

                    <input type="text" placeholder="Your Name" required>

                    <input type="email" placeholder="Email Address" required>

                    <textarea rows="6" placeholder="Write your message..." required></textarea>

                    <button type="submit">

                        Send Message

                    </button>

                </form>

            </div>

        </div>

        <div style="margin-top:40px;">

            <iframe src="https://maps.google.com/maps?q=Kathmandu&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%"
                height="350" style="border:0;border-radius:12px;" loading="lazy">
            </iframe>

        </div>

    </section>

    <footer>

        <div class="footer-content">

            <h2>GoRide Nepal</h2>

            <p>Premium Vehicle Rental Service</p>

            <p>&copy; 2026 GoRide Nepal. All Rights Reserved.</p>

        </div>

    </footer>

    <script src="darkmode.js"></script>

</body>

</html>
